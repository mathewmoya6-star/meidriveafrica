<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bank - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #fff;
            --soft-gray: #B7C4D6;
            --correct: #00FF88;
            --incorrect: #ff4444;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 100px 2rem 2rem;
        }
        .quiz-card {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
            margin-bottom: 1rem;
        }
        .question-text {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        .option {
            background: var(--secondary-dark);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover {
            border-color: var(--neon-green);
            transform: translateX(5px);
        }
        .option.selected {
            border-color: var(--neon-green);
            background: rgba(0,255,136,0.1);
        }
        .option.correct {
            border-color: var(--correct);
            background: rgba(0,255,136,0.2);
        }
        .option.incorrect {
            border-color: var(--incorrect);
            background: rgba(255,68,68,0.1);
        }
        .explanation {
            background: var(--secondary-dark);
            border-radius: 12px;
            padding: 1rem;
            margin: 1rem 0;
            border-left: 4px solid var(--neon-green);
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .progress {
            font-size: 0.9rem;
            color: var(--soft-gray);
        }
        .score {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--neon-green);
        }
        .btn-next {
            background: var(--neon-green);
            color: var(--dark-navy);
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .category-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .category-btn {
            background: var(--secondary-dark);
            border: 1px solid rgba(0,255,136,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn.active {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        .result-card {
            text-align: center;
            padding: 2rem;
        }
        .final-score {
            font-size: 3rem;
            color: var(--neon-green);
            margin: 1rem 0;
        }
        @media (max-width: 768px) {
            .container { padding: 80px 1rem 1rem; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar"><div style="max-width:1200px;margin:auto;"><div style="font-size:1.5rem;color:var(--neon-green);">📝 Quiz Bank</div></div></nav>
    <div class="container" id="container"><div class="quiz-card">Loading questions...</div></div>
    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let questions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let selectedCategory = 'All';
        let currentUser = null;
        
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user || null;
            if (!currentUser) {
                document.getElementById('container').innerHTML = `
                    <div class="quiz-card" style="text-align:center;">
                        <h2>🔒 Please Login</h2>
                        <p>You need to be logged in to take the quiz.</p>
                        <button class="btn-next" onclick="location.href='/login.html'">Login</button>
                    </div>
                `;
                return false;
            }
            return true;
        }
        
        async function loadQuestions() {
            let query = supabase.from('quiz_questions').select('*');
            if (selectedCategory !== 'All') {
                query = query.eq('category', selectedCategory);
            }
            const { data, error } = await query;
            if (error) {
                console.error('Error loading questions:', error);
                return;
            }
            questions = data || [];
            currentIndex = 0;
            userAnswers = [];
            renderQuestion();
        }
        
        async function loadCategories() {
            const { data } = await supabase.from('quiz_questions').select('category');
            const categories = ['All', ...new Set(data.map(q => q.category))];
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'category-filter';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                btn.className = `category-btn ${selectedCategory === cat ? 'active' : ''}`;
                btn.onclick = () => {
                    selectedCategory = cat;
                    loadQuestions();
                };
                categoryDiv.appendChild(btn);
            });
            document.getElementById('container').prepend(categoryDiv);
        }
        
        function renderQuestion() {
            if (currentIndex >= questions.length) {
                showResults();
                return;
            }
            
            const q = questions[currentIndex];
            const userAnswer = userAnswers[currentIndex];
            
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            const categoryDiv = document.createElement('div');
            categoryDiv.className = 'category-filter';
            const allBtn = document.createElement('button');
            allBtn.textContent = `📂 ${q.category}`;
            allBtn.className = 'category-btn';
            allBtn.style.background = 'var(--neon-green)';
            categoryDiv.appendChild(allBtn);
            container.appendChild(categoryDiv);
            
            const quizCard = document.createElement('div');
            quizCard.className = 'quiz-card';
            
            const header = document.createElement('div');
            header.className = 'quiz-header';
            header.innerHTML = `
                <div class="progress">Question ${currentIndex + 1} of ${questions.length}</div>
                <div class="score">Score: ${userAnswers.filter(a => a?.isCorrect).length || 0}</div>
            `;
            quizCard.appendChild(header);
            
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-text';
            questionDiv.textContent = q.question;
            quizCard.appendChild(questionDiv);
            
            q.options.forEach((option, idx) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = `option ${userAnswer?.selected === idx ? 'selected' : ''}`;
                optionDiv.innerHTML = `<span style="font-weight:bold;">${String.fromCharCode(65+idx)}.</span> ${option}`;
                optionDiv.onclick = () => selectAnswer(idx, q.correct_answer, q.explanation);
                quizCard.appendChild(optionDiv);
            });
            
            if (userAnswer?.selected !== undefined) {
                const explanation = document.createElement('div');
                explanation.className = 'explanation';
                explanation.innerHTML = `
                    <strong>${userAnswer.isCorrect ? '✅ Correct!' : '❌ Incorrect'}</strong><br>
                    ${q.explanation}
                `;
                quizCard.appendChild(explanation);
            }
            
            if (userAnswer?.selected !== undefined && currentIndex < questions.length - 1) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn-next';
                nextBtn.textContent = 'Next Question →';
                nextBtn.onclick = () => {
                    currentIndex++;
                    renderQuestion();
                };
                quizCard.appendChild(nextBtn);
            } else if (currentIndex === questions.length - 1 && userAnswer?.selected !== undefined) {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn-next';
                nextBtn.textContent = 'Show Results';
                nextBtn.onclick = showResults;
                quizCard.appendChild(nextBtn);
            }
            
            container.appendChild(quizCard);
        }
        
        function selectAnswer(selected, correct, explanation) {
            if (userAnswers[currentIndex]) return;
            
            const isCorrect = selected === correct;
            userAnswers[currentIndex] = {
                selected,
                isCorrect,
                explanation
            };
            
            renderQuestion();
            
            // Save attempt to database
            if (currentUser) {
                supabase.from('quiz_attempts').insert({
                    user_id: currentUser.id,
                    question_id: questions[currentIndex].id,
                    user_answer: selected,
                    is_correct: isCorrect
                });
            }
        }
        
        function showResults() {
            const total = questions.length;
            const correct = userAnswers.filter(a => a?.isCorrect).length;
            const percentage = Math.round((correct / total) * 100);
            
            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="quiz-card result-card">
                    <h2>🎉 Quiz Complete!</h2>
                    <div class="final-score">${correct}/${total}</div>
                    <div class="score">${percentage}%</div>
                    ${percentage >= 70 ? '<p style="color:var(--neon-green);">✅ Congratulations! You passed!</p>' : '<p style="color:#ff9800;">📚 Keep practicing to improve your score!</p>'}
                    <button class="btn-next" onclick="restartQuiz()">Restart Quiz</button>
                    <button class="btn-next" style="margin-left:1rem;background:var(--secondary-dark);border:1px solid var(--neon-green);" onclick="location.href='/'">Back to Home</button>
                </div>
            `;
        }
        
        function restartQuiz() {
            userAnswers = [];
            currentIndex = 0;
            renderQuestion();
        }
        
        async function init() {
            if (!await checkAuth()) return;
            await loadCategories();
            await loadQuestions();
        }
        
        init();
    </script>
</body>
</html>
