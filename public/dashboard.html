<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dashboard | MEI Drive Africa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A234F 0%, #041B3D 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Navbar */
        .navbar {
            background: rgba(4, 27, 61, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00FF88;
        }

        .logo span {
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-email {
            color: #00FF88;
        }

        .logout-btn {
            background: #ff4d4f;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff7875;
            transform: translateY(-2px);
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Welcome Section */
        .welcome-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center;
        }

        .welcome-card h1 {
            color: #00FF88;
            margin-bottom: 0.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00FF88;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            font-size: 2.5rem;
            color: #00FF88;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #00FF88;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #B7C4D6;
            font-size: 0.9rem;
        }

        /* Enrollments Section */
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #00FF88;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .enrollments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .enrollment-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 136, 0.15);
            transition: all 0.3s ease;
        }

        .enrollment-card:hover {
            border-color: #00FF88;
        }

        .enrollment-title {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #00FF88;
        }

        .enrollment-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .status-active {
            background: rgba(0, 200, 81, 0.2);
            color: #00C851;
            border: 1px solid #00C851;
        }

        .status-pending {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .status-completed {
            background: rgba(0, 200, 81, 0.2);
            color: #00C851;
            border: 1px solid #00C851;
        }

        .enrollment-date {
            font-size: 0.75rem;
            color: #B7C4D6;
            margin-top: 0.5rem;
        }

        /* Loading States */
        .loading {
            text-align: center;
            padding: 3rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(4, 27, 61, 0.6);
            border-radius: 16px;
            color: #B7C4D6;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Error State */
        .error-state {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 77, 79, 0.1);
            border-radius: 16px;
            color: #ff7875;
            border: 1px solid #ff4d4f;
        }

        .retry-btn {
            background: #00FF88;
            color: #041B3D;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A234F;
            border-left: 4px solid #00FF88;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            border-left-color: #ff4d4f;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .enrollments-grid {
                grid-template-columns: 1fr;
            }
            
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            MEI DRIVE <span>AFRICA</span>
        </div>
        <div class="user-info">
            <i class="fas fa-user-circle" style="font-size: 1.5rem;"></i>
            <span class="user-email" id="userEmail">Loading...</span>
            <button class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-card">
        <h1>Welcome Back!</h1>
        <p>Continue your driving journey with MEI DRIVE AFRICA</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="stat-value" id="enrollmentsCount">0</div>
            <div class="stat-label">Courses Enrolled</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <div class="stat-value" id="progressCount">0</div>
            <div class="stat-label">Average Progress</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">
                <i class="fas fa-certificate"></i>
            </div>
            <div class="stat-value" id="completedCount">0</div>
            <div class="stat-label">Completed Courses</div>
        </div>
    </div>

    <div class="section-title">
        <i class="fas fa-book-open"></i>
        <span>My Enrollments</span>
    </div>
    <div id="enrollmentsContainer">
        <!-- Enrollments will load here -->
    </div>
</div>

<script>
// ============================================
// SUPABASE CONFIGURATION
// ============================================
const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================
// GLOBAL VARIABLES
// ============================================
let currentUser = null;
let isLoading = false;

// ============================================
// TOAST NOTIFICATION
// ============================================
function showToast(message, type = 'info') {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 4000);
}

// ============================================
// CHECK ADMIN ROLE (Security Fix)
// ============================================
async function checkUserRole(userId) {
    try {
        const { data: profile, error } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', userId)
            .maybeSingle();
        
        if (error) {
            console.error('Error fetching profile:', error);
            return 'user';
        }
        
        return profile?.role || 'user';
    } catch (err) {
        console.error('Role check error:', err);
        return 'user';
    }
}

// ============================================
// LOAD USER DATA
// ============================================
async function loadUserData() {
    if (isLoading) return;
    isLoading = true;
    
    try {
        // Get current session
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        
        if (sessionError || !session) {
            window.location.href = '/login.html';
            return;
        }
        
        currentUser = session.user;
        
        // Update UI with user email
        const userEmailEl = document.getElementById('userEmail');
        if (userEmailEl) {
            userEmailEl.textContent = currentUser.email;
        }
        
        // Check user role for security
        const userRole = await checkUserRole(currentUser.id);
        console.log('User role:', userRole);
        
        // Load enrollments
        await loadEnrollments();
        
    } catch (err) {
        console.error('Error loading user data:', err);
        showToast('Failed to load user data', 'error');
        
        // Redirect to login on critical error
        if (err.message.includes('JWT')) {
            window.location.href = '/login.html';
        }
    } finally {
        isLoading = false;
    }
}

// ============================================
// LOAD ENROLLMENTS (With Error Handling)
// ============================================
async function loadEnrollments() {
    const container = document.getElementById('enrollmentsContainer');
    
    if (!container) return;
    
    // Show loading state
    container.innerHTML = `
        <div class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem;">Loading your enrollments...</p>
        </div>
    `;
    
    try {
        // Fetch enrollments with error handling
        const { data: enrollments, error: enrollmentsError } = await supabase
            .from('enrollments')
            .select(`
                *,
                courses:course_id (
                    id,
                    name,
                    description,
                    type,
                    duration,
                    level
                )
            `)
            .eq('user_id', currentUser.id)
            .order('enrolled_at', { ascending: false });
        
        if (enrollmentsError) {
            throw enrollmentsError;
        }
        
        // Update stats
        const enrollmentsList = enrollments || [];
        const enrollmentsCount = enrollmentsList.length;
        const completedCount = enrollmentsList.filter(e => e.status === 'completed').length;
        
        // Update UI stats
        const enrollmentsCountEl = document.getElementById('enrollmentsCount');
        const completedCountEl = document.getElementById('completedCount');
        
        if (enrollmentsCountEl) enrollmentsCountEl.textContent = enrollmentsCount;
        if (completedCountEl) completedCountEl.textContent = completedCount;
        
        // Calculate average progress (if you have progress field)
        const avgProgress = enrollmentsList.length > 0 
            ? Math.round(enrollmentsList.reduce((sum, e) => sum + (e.progress || 0), 0) / enrollmentsList.length)
            : 0;
        
        const progressCountEl = document.getElementById('progressCount');
        if (progressCountEl) progressCountEl.textContent = `${avgProgress}%`;
        
        // Display enrollments
        if (enrollmentsList.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-book-open"></i>
                    <p>You haven't enrolled in any courses yet.</p>
                    <button class="retry-btn" onclick="window.location.href='/courses.html'">
                        Browse Courses
                    </button>
                </div>
            `;
            return;
        }
        
        // Build enrollments grid
        let html = '<div class="enrollments-grid">';
        
        for (const enrollment of enrollmentsList) {
            const course = enrollment.courses;
            const statusClass = enrollment.status === 'active' ? 'status-active' : 
                               (enrollment.status === 'completed' ? 'status-completed' : 'status-pending');
            const statusText = enrollment.status?.toUpperCase() || 'PENDING';
            
            html += `
                <div class="enrollment-card">
                    <div class="enrollment-title">${escapeHtml(course?.name || 'Course not found')}</div>
                    <p style="font-size: 0.85rem; color: #B7C4D6; margin-top: 0.25rem;">
                        ${escapeHtml(course?.description?.substring(0, 100) || 'No description')}${course?.description?.length > 100 ? '...' : ''}
                    </p>
                    <div class="enrollment-status ${statusClass}">
                        <i class="fas ${enrollment.status === 'active' ? 'fa-play' : (enrollment.status === 'completed' ? 'fa-check' : 'fa-clock')}"></i>
                        ${statusText}
                    </div>
                    <div class="enrollment-date">
                        <i class="fas fa-calendar-alt"></i> Enrolled: ${new Date(enrollment.enrolled_at).toLocaleDateString()}
                    </div>
                    ${enrollment.progress ? `
                        <div style="margin-top: 0.75rem;">
                            <div style="background: #0A234F; border-radius: 10px; height: 6px; overflow: hidden;">
                                <div style="background: #00FF88; width: ${enrollment.progress}%; height: 100%;"></div>
                            </div>
                            <div style="font-size: 0.7rem; margin-top: 0.25rem; color: #00FF88;">${enrollment.progress}% Complete</div>
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        html += '</div>';
        container.innerHTML = html;
        
    } catch (err) {
        console.error('Error loading enrollments:', err);
        container.innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                <p>Failed to load your enrollments</p>
                <button class="retry-btn" onclick="loadEnrollments()">
                    <i class="fas fa-sync-alt"></i> Retry
                </button>
            </div>
        `;
        showToast('Failed to load enrollments', 'error');
    }
}

// ============================================
// LOGOUT FUNCTION
// ============================================
async function handleLogout() {
    try {
        const { error } = await supabase.auth.signOut();
        if (error) throw error;
        
        // Clear any local data
        currentUser = null;
        
        // Redirect to login
        window.location.href = '/login.html';
    } catch (err) {
        console.error('Logout error:', err);
        showToast('Failed to logout. Please try again.', 'error');
    }
}

// ============================================
// AUTH STATE LISTENER
// ============================================
supabase.auth.onAuthStateChange((event, session) => {
    console.log('Auth event:', event);
    
    if (event === 'SIGNED_OUT') {
        window.location.href = '/login.html';
    }
    
    if (event === 'TOKEN_REFRESHED') {
        console.log('Session refreshed successfully');
    }
    
    if (event === 'USER_UPDATED') {
        console.log('User updated, reloading data');
        loadUserData();
    }
});

// ============================================
// ESCAPE HTML FUNCTION (XSS Protection)
// ============================================
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ============================================
// INITIALIZATION
// ============================================
async function init() {
    // Load user data
    await loadUserData();
    
    // Check session periodically
    setInterval(async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session && currentUser) {
            console.log('Session expired, redirecting to login');
            window.location.href = '/login.html';
        }
    }, 60000); // Check every minute
}

// Start the app
init();

// Make functions global for onclick handlers
window.handleLogout = handleLogout;
window.loadEnrollments = loadEnrollments;
</script>
</body>
</html>
