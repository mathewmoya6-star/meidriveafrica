<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MEI Drive Africa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h2 { color: #041B3D; margin-bottom: 10px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 16px; transition: all 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #00FF88; }
        button {
            width: 100%; padding: 14px; background: #00FF88; color: #041B3D;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover:not(:disabled) { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; display: none; background: #fde8e8; padding: 10px; border-radius: 8px; }
        .success { color: #00FF88; margin-top: 10px; font-size: 14px; display: none; background: #e8f5e9; padding: 10px; border-radius: 8px; }
        .back { margin-top: 20px; display: inline-block; color: #666; text-decoration: none; }
        .back:hover { color: #00FF88; }
        .spinner { display: none; width: 20px; height: 20px; border: 2px solid #041B3D; border-top-color: #00FF88; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚗</div>
        <h2>MEI DRIVE AFRICA</h2>
        <form id="loginForm">
            <div class="input-group"><label>📧 Email Address</label><input type="email" id="email" required autocomplete="email"></div>
            <div class="input-group"><label>🔒 Password</label><input type="password" id="password" required autocomplete="current-password"></div>
            <button type="submit" id="loginBtn">Login</button>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
            <div id="spinner" class="spinner"></div>
        </form>
        <div style="margin-top: 1rem;"><a href="/reset-password.html" class="back">Forgot Password?</a></div>
        <div><a href="/register.html" class="back">Create Account</a> | <a href="/" class="back">← Back to Home</a></div>
    </div>
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const spinner = document.getElementById('spinner');
        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('verified') === 'true') {
            successDiv.textContent = 'Email verified! You can now login.';
            successDiv.style.display = 'block';
        }
        if (urlParams.get('expired') === 'true') {
            errorDiv.textContent = 'Your session expired. Please login again.';
            errorDiv.style.display = 'block';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            loginBtn.disabled = true;
            spinner.style.display = 'block';
            
            const { error } = await supabase.auth.signInWithPassword({
                email: emailInput.value.trim(),
                password: passwordInput.value
            });
            
            spinner.style.display = 'none';
            loginBtn.disabled = false;
            
            if (error) {
                errorDiv.textContent = error.message === 'Invalid login credentials' ? 'Invalid email or password' : error.message;
                errorDiv.style.display = 'block';
            } else {
                successDiv.textContent = 'Login successful! Redirecting...';
                successDiv.style.display = 'block';
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1000);
            }
        });
    </script>
</body>
</html>
