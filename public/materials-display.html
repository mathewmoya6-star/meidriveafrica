<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Materials - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        
        /* Navbar */
        .navbar {
            background: var(--dark-navy);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid rgba(0,255,136,0.15);
        }
        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--neon-green);
            cursor: pointer;
        }
        .logo span { color: white; }
        
        /* Main Content */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 20px 40px;
        }
        
        /* Course Header */
        .course-header {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .course-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .course-badge {
            display: inline-block;
            background: var(--neon-green);
            color: var(--dark-navy);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 1rem;
        }
        .course-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            margin: 1rem 0;
        }
        
        /* Units Section */
        .units-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .units-title {
            font-size: 1.5rem;
        }
        .units-count {
            background: var(--secondary-dark);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        /* Unit List */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }
        .unit-card {
            background: var(--dark-navy);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(0,255,136,0.12);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .unit-card:hover {
            transform: translateX(5px);
            border-color: var(--neon-green);
        }
        .unit-number {
            width: 45px;
            height: 45px;
            background: var(--secondary-dark);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--neon-green);
        }
        .unit-info {
            flex: 1;
        }
        .unit-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .unit-duration {
            font-size: 0.7rem;
            color: var(--soft-gray);
        }
        .unit-icon {
            color: var(--neon-green);
            font-size: 1.2rem;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Back Button */
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-back:hover {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        
        /* No Units */
        .no-units {
            text-align: center;
            padding: 3rem;
            background: var(--dark-navy);
            border-radius: 16px;
        }
        .no-units i {
            font-size: 3rem;
            color: var(--neon-green);
            margin-bottom: 1rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 80px 15px 30px; }
            .course-header { padding: 1.5rem; }
            .units-grid { grid-template-columns: 1fr; }
            .unit-card { padding: 0.8rem; }
            .unit-number { width: 35px; height: 35px; font-size: 0.9rem; }
            .course-price { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
    </div>
</nav>

<div class="container" id="container">
    <div class="loading">
        <div class="spinner"></div>
        <p>Loading course materials...</p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Get course ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');
    
    // Course icons
    const courseIcons = {
        1: '🚗', 2: '🚌', 3: '🚸', 4: '⚡', 5: '🛵', 6: '🚛', 7: '📚', 8: '📝'
    };
    
    async function loadCourseAndUnits() {
        const container = document.getElementById('container');
        
        if (!courseId) {
            container.innerHTML = `
                <div class="no-units">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>No Course Selected</h3>
                    <p>Please select a course to view materials.</p>
                    <button class="btn-back" onclick="location.href='/'">← Back to Courses</button>
                </div>
            `;
            return;
        }
        
        try {
            // Load course details
            const { data: course, error: courseError } = await supabase
                .from('courses')
                .select('*')
                .eq('id', courseId)
                .single();
            
            if (courseError) throw courseError;
            
            // Load units
            const { data: units, error: unitsError } = await supabase
                .from('course_units')
                .select('*')
                .eq('course_id', courseId)
                .order('unit_number', { ascending: true });
            
            if (unitsError) throw unitsError;
            
            const isFree = course.type === 'free';
            const icon = courseIcons[course.id] || '📚';
            const courseName = course.name || course.title;
            const courseDesc = course.description || '';
            
            container.innerHTML = `
                <button class="btn-back" onclick="location.href='/'">
                    <i class="fas fa-arrow-left"></i> Back to Courses
                </button>
                
                <div class="course-header">
                    <div class="course-icon">${icon}</div>
                    <div class="course-badge">${isFree ? 'FREE COURSE' : 'PREMIUM COURSE'}</div>
                    <h1>${escapeHtml(courseName)}</h1>
                    <p>${escapeHtml(courseDesc)}</p>
                    <div class="course-price">${isFree ? 'FREE' : `KES ${(course.price || 0).toLocaleString()}`}</div>
                    <p><strong>Duration:</strong> ${course.duration || 'Self-paced'} | <strong>Level:</strong> ${course.level || 'All levels'}</p>
                </div>
                
                <div class="units-header">
                    <h2 class="units-title"><i class="fas fa-book-open"></i> Course Materials</h2>
                    <div class="units-count">${units?.length || 0} Units</div>
                </div>
                
                ${!units || units.length === 0 ? `
                    <div class="no-units">
                        <i class="fas fa-folder-open"></i>
                        <h3>No Units Available</h3>
                        <p>Course materials are being prepared. Check back soon!</p>
                    </div>
                ` : `
                    <div class="units-grid">
                        ${units.map(unit => `
                            <div class="unit-card" onclick="viewUnit(${unit.unit_number})">
                                <div class="unit-number">${unit.unit_number}</div>
                                <div class="unit-info">
                                    <div class="unit-title">${escapeHtml(unit.title)}</div>
                                    <div class="unit-duration"><i class="fas fa-clock"></i> ${unit.duration || '1 hour'}</div>
                                </div>
                                <div class="unit-icon">
                                    <i class="fas fa-chevron-right"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `}
            `;
            
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = `
                <div class="no-units">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Error Loading Course</h3>
                    <p>${error.message}</p>
                    <button class="btn-back" onclick="location.href='/'">← Back to Courses</button>
                </div>
            `;
        }
    }
    
    function viewUnit(unitNumber) {
        window.location.href = `/unit-view.html?course_id=${courseId}&unit=${unitNumber}`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadCourseAndUnits();
</script>
</body>
</html>
