<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Admin Login | MEI DRIVE AFRICA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --primary:#041B3D;
    --secondary:#0A234F;
    --accent:#00FF88;
    --white:#ffffff;
    --gray:#B7C4D6;
    --danger:#ff4d4d;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:Segoe UI,sans-serif;

    background:
    linear-gradient(rgba(4,27,61,.92),rgba(10,35,79,.92)),
    url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop')
    center/cover;
}

.login-card{
    width:100%;
    max-width:420px;

    background:rgba(4,27,61,.96);

    border:1px solid rgba(0,255,136,.15);

    border-radius:24px;

    padding:40px 30px;

    backdrop-filter:blur(10px);

    box-shadow:0 10px 40px rgba(0,0,0,.4);
}

.logo{
    font-size:58px;
    text-align:center;
    margin-bottom:12px;
}

h1{
    color:var(--accent);
    text-align:center;
    font-size:1.9rem;
}

.subtitle{
    text-align:center;
    color:var(--gray);
    margin-top:8px;
    margin-bottom:24px;
}

.badge{
    width:max-content;
    margin:auto;
    margin-bottom:30px;

    background:var(--accent);
    color:var(--primary);

    padding:7px 18px;

    border-radius:30px;

    font-size:.75rem;
    font-weight:700;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    color:white;
    margin-bottom:8px;
    font-size:.92rem;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:14px;

    border-radius:14px;

    border:2px solid rgba(0,255,136,.15);

    background:#08172e;

    color:white;

    font-size:15px;

    transition:.3s;
}

.input-group input:focus{
    outline:none;
    border-color:var(--accent);
}

.btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:14px;

    background:var(--accent);

    color:var(--primary);

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(0,255,136,.25);
}

.btn:disabled{
    opacity:.6;
    cursor:not-allowed;
}

.message{
    display:none;

    padding:12px;

    border-radius:12px;

    margin-bottom:18px;

    font-size:.9rem;
}

.error{
    background:rgba(255,77,77,.12);
    color:#ffb3b3;
    border:1px solid rgba(255,77,77,.3);
}

.success{
    background:rgba(0,255,136,.12);
    color:#b7ffe1;
    border:1px solid rgba(0,255,136,.3);
}

.back-link{
    display:block;
    margin-top:22px;
    text-align:center;

    color:var(--gray);

    text-decoration:none;
}

.back-link:hover{
    color:var(--accent);
}

.loader{
    width:18px;
    height:18px;

    border:2px solid #041B3D;
    border-top-color:white;

    border-radius:50%;

    display:inline-block;

    animation:spin .7s linear infinite;

    vertical-align:middle;

    margin-right:8px;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@media(max-width:480px){

    .login-card{
        padding:30px 22px;
    }

    h1{
        font-size:1.5rem;
    }

}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">🚗</div>

    <h1>MEI DRIVE AFRICA</h1>

    <p class="subtitle">
        Secure Administrator Access
    </p>

    <div class="badge">
        ADMIN PANEL
    </div>

    <div id="errorBox" class="message error"></div>

    <div id="successBox" class="message success"></div>

    <form id="loginForm">

        <div class="input-group">
            <label>Admin Email</label>

            <input
                type="email"
                id="email"
                placeholder="admin@meidriveafrica.com"
                required
            >
        </div>

        <div class="input-group">
            <label>Password</label>

            <input
                type="password"
                id="password"
                placeholder="Enter password"
                required
            >
        </div>

        <button
            type="submit"
            class="btn"
            id="loginBtn"
        >
            Login as Admin
        </button>

    </form>

    <a href="/" class="back-link">
        ← Back Home
    </a>

</div>

<script>
// Supabase configuration
const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';

// Initialize Supabase client
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// DOM elements
const form = document.getElementById('loginForm');
const loginBtn = document.getElementById('loginBtn');
const errorBox = document.getElementById('errorBox');
const successBox = document.getElementById('successBox');

// Helper functions
function showError(message) {
    errorBox.style.display = 'block';
    successBox.style.display = 'none';
    errorBox.textContent = message;
}

function showSuccess(message) {
    successBox.style.display = 'block';
    errorBox.style.display = 'none';
    successBox.textContent = message;
}

function setLoading(state) {
    loginBtn.disabled = state;
    loginBtn.innerHTML = state
        ? '<span class="loader"></span>Logging in...'
        : 'Login as Admin';
}

// Verify if user is admin
async function verifyAdmin(userId) {
    try {
        const { data, error } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', userId)
            .single();

        if (error) {
            console.error('Error verifying admin:', error);
            return false;
        }

        return data?.role === 'admin';
    } catch (err) {
        console.error('Verify admin error:', err);
        return false;
    }
}

// Check if already logged in
async function checkExistingSession() {
    const { data: { session } } = await supabase.auth.getSession();

    if (!session) return;

    const isAdmin = await verifyAdmin(session.user.id);

    if (isAdmin) {
        window.location.href = '/admin-dashboard.html';
    }
}

// Login function
async function login(email, password) {
    const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
    });

    return { data, error };
}

// Form submit handler
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        return showError('Please enter email and password');
    }

    setLoading(true);
    showError('');
    
    try {
        // Attempt login
        const { data, error } = await login(email, password);

        if (error) {
            setLoading(false);
            return showError(error.message);
        }

        // Verify admin role
        const isAdmin = await verifyAdmin(data.user.id);

        if (!isAdmin) {
            await supabase.auth.signOut();
            setLoading(false);
            return showError('Access denied. Admin only.');
        }

        // Login successful
        showSuccess('Login successful. Redirecting to admin dashboard...');

        setTimeout(() => {
            window.location.href = '/admin-dashboard.html';
        }, 1200);

    } catch (err) {
        console.error('Login error:', err);
        showError('Something went wrong. Please try again.');
        setLoading(false);
    }
});

// Check existing session on page load
checkExistingSession();
</script>

</body>
</html>
