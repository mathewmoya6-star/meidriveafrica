<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MEI Drive Africa</title>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --neon-green: #00FF88;
            --dark-blue: #041B3D;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        /* Background animation */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="white" opacity="0.1"/><circle cx="80" cy="40" r="3" fill="white" opacity="0.1"/><circle cx="50" cy="70" r="2" fill="white" opacity="0.1"/></svg>');
            animation: float 20s linear infinite;
        }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 450px;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        h2 {
            color: var(--dark-blue);
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .admin-badge {
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: bold;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
            padding: 12px;
            background: #fde8e8;
            border-radius: 10px;
            display: none;
        }
        
        .error.show {
            display: block;
        }
        
        .loading {
            color: var(--gradient-start);
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .demo-info {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
            border: 1px solid #e0e0e0;
        }
        
        .demo-info strong {
            color: var(--neon-green);
        }
        
        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: var(--gradient-start);
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: var(--dark-blue);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🚗</div>
        <h2>MEI DRIVE AFRICA</h2>
        <div class="admin-badge">Administrator Panel</div>
        
        <form id="adminLoginForm">
            <div class="input-group">
                <label>📧 Email Address</label>
                <input type="email" id="email" placeholder="admin@meidrive.com" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>🔒 Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" id="loginBtn">Login as Admin</button>
        </form>
        
        <div id="error" class="error"></div>
        <div id="loading" class="loading">🔐 Authenticating...</div>
        
        <div class="demo-info">
            <strong>📝 Demo Credentials:</strong><br>
            Email: <strong>admin@meidrive.com</strong><br>
            Password: <strong>admin123</strong>
        </div>
        
        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // DOM Elements
        const form = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');
        
        // Demo credentials (fallback)
        const DEMO_ADMIN = {
            email: 'admin@meidrive.com',
            password: 'admin123'
        };
        
        // Helper functions
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
        
        function hideError() {
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';
        }
        
        function showLoading() {
            loadingDiv.classList.add('show');
            loginBtn.disabled = true;
        }
        
        function hideLoading() {
            loadingDiv.classList.remove('show');
            loginBtn.disabled = false;
        }
        
        function showSuccessAndRedirect() {
            loadingDiv.innerHTML = '✅ Login successful! Redirecting to dashboard...';
            setTimeout(() => {
                window.location.href = 'admin-dashboard.html';
            }, 1000);
        }
        
        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            hideError();
            showLoading();
            
            // First check: Demo credentials
            if (email === DEMO_ADMIN.email && password === DEMO_ADMIN.password) {
                localStorage.setItem('adminToken', 'demo-token-2024');
                localStorage.setItem('adminEmail', email);
                localStorage.setItem('adminName', 'Super Admin');
                showSuccessAndRedirect();
                return;
            }
            
            // Second: Try Supabase authentication with admin check
            try {
                // Attempt login
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Check if user has admin role
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();
                
                if (profileError) throw new Error('Unable to verify admin status');
                
                if (profile?.role === 'admin') {
                    localStorage.setItem('adminToken', data.session.access_token);
                    localStorage.setItem('adminEmail', email);
                    localStorage.setItem('adminName', data.user.user_metadata?.full_name || 'Administrator');
                    showSuccessAndRedirect();
                } else {
                    await supabase.auth.signOut();
                    showError('You are not authorized as an administrator');
                    hideLoading();
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showError('Login failed. Use demo credentials: admin@meidrive.com / admin123');
                hideLoading();
            }
        });
        
        // Auto-fill demo credentials for testing
        emailInput.value = 'admin@meidrive.com';
        passwordInput.value = 'admin123';
        
        // Enter key support
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
        
        // Check if already logged in
        const existingToken = localStorage.getItem('adminToken');
        if (existingToken) {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>
