<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h2 { color: #041B3D; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 12px; font-size: 16px; transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none; border-color: #00FF88;
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
        }
        button {
            width: 100%; padding: 14px; background: #00FF88; color: #041B3D;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 16px; transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,255,136,0.3); }
        .error {
            color: #e74c3c; margin-top: 10px; font-size: 14px;
            background: #fde8e8; padding: 10px; border-radius: 8px;
            display: none;
        }
        .success {
            color: #27ae60; margin-top: 10px; font-size: 14px;
            background: #d5f4e6; padding: 10px; border-radius: 8px;
            display: none;
        }
        .spinner {
            display: none; width: 24px; height: 24px;
            border: 2px solid #041B3D; border-top-color: #00FF88;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 10px auto 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-switch { margin-top: 20px; color: #666; }
        .auth-switch a { color: #00FF88; text-decoration: none; font-weight: bold; }
        .back-home { margin-top: 20px; display: inline-block; color: #666; text-decoration: none; }
        @media (max-width: 480px) { .register-container { padding: 30px 20px; } }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">🚗</div>
        <h2>Create Account</h2>
        <p class="subtitle">Join MEI Drive Africa today</p>
        
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
        
        <form id="registerForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
                <div style="font-size: 12px; color: #999; margin-top: 5px;">Password must be at least 6 characters</div>
            </div>
            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        
        <div id="loadingSpinner" class="spinner"></div>
        
        <div class="auth-switch">
            Already have an account? <a href="/login.html">Login</a>
        </div>
        <div>
            <a href="/" class="back-home">← Back to Home</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const form = document.getElementById('registerForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const registerBtn = document.getElementById('registerBtn');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }
        
        function setLoading(loading) {
            if (loading) {
                loadingSpinner.style.display = 'block';
                registerBtn.disabled = true;
                registerBtn.style.opacity = '0.6';
            } else {
                loadingSpinner.style.display = 'none';
                registerBtn.disabled = false;
                registerBtn.style.opacity = '1';
            }
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            if (!fullName || !email || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            setLoading(true);
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            role: 'learner'
                        }
                    }
                });
                
                setLoading(false);
                
                if (error) {
                    showError(error.message);
                    return;
                }
                
                if (data.user) {
                    showSuccess('✅ Registration successful! Please check your email to confirm your account.');
                    
                    fullNameInput.value = '';
                    emailInput.value = '';
                    passwordInput.value = '';
                    confirmPasswordInput.value = '';
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                }
            } catch (err) {
                setLoading(false);
                showError('Network error. Please try again.');
                console.error('Registration error:', err);
            }
        });
        
        confirmPasswordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
