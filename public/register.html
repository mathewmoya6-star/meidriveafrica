<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEI DRIVE AFRICA - Register</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A234F 0%, #041B3D 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 450px;
            width: 100%;
            background: rgba(4, 27, 61, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        h1 {
            color: #00FF88;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #B7C4D6;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: white;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        label .required {
            color: #ff4444;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(10, 35, 79, 0.8);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #00FF88;
            background: rgba(10, 35, 79, 1);
        }
        
        input.error {
            border-color: #ff4444;
        }
        
        input.success {
            border-color: #00C851;
        }
        
        .password-match {
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .password-match.match {
            color: #00C851;
            display: block;
        }
        
        .password-match.not-match {
            color: #ff4444;
            display: block;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #B7C4D6;
        }
        
        .login-link a {
            color: #00FF88;
            text-decoration: none;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        
        .message.success {
            background: rgba(0, 200, 81, 0.2);
            border: 1px solid #00C851;
            color: #00C851;
            display: block;
        }
        
        .message.error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff4444;
            display: block;
        }
        
        .message.info {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00FF88;
            color: #00FF88;
            display: block;
        }
        
        .ntsa-badge {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #00FF88;
        }
        
        .requirements {
            font-size: 12px;
            color: #B7C4D6;
            margin-top: 5px;
        }
        
        .requirements ul {
            margin-left: 20px;
            margin-top: 5px;
        }
        
        .requirements li {
            margin-bottom: 3px;
        }
        
        .requirements li.valid {
            color: #00C851;
        }
        
        .requirements li.invalid {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 MEI DRIVE AFRICA</h1>
        <div class="subtitle">Create Your Account to Start Learning</div>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Full Name <span class="required">*</span></label>
                <input type="text" id="fullName" required placeholder="John Doe">
            </div>
            
            <div class="form-group">
                <label>Email Address <span class="required">*</span></label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="0712345678">
                <div class="requirements">Format: 07XX XXX XXX (Kenyan number)</div>
            </div>
            
            <div class="form-group">
                <label>Password <span class="required">*</span></label>
                <input type="password" id="password" required placeholder="Min 6 characters">
                <div class="requirements">
                    Password must:
                    <ul>
                        <li id="lengthReq">✓ Be at least 6 characters</li>
                    </ul>
                </div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirmPassword" required placeholder="Type password again">
                <div id="passwordMatchMsg" class="password-match"></div>
            </div>
            
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="#" onclick="window.location.href='/'">Login here</a>
        </div>
        
        <div class="ntsa-badge">
            <i class="fas fa-id-card"></i> NTSA Certified: ILR-7WA1P62
        </div>
        
        <div id="message" class="message"></div>
    </div>
    
    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Get form elements
        const form = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const messageDiv = document.getElementById('message');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordMatchMsg = document.getElementById('passwordMatchMsg');
        
        // Function to show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
        
        // Password strength validation
        function validatePassword() {
            const password = passwordInput.value;
            const lengthReq = document.getElementById('lengthReq');
            
            let isValid = true;
            
            // Check length
            if (password.length >= 6) {
                lengthReq.className = 'valid';
                lengthReq.innerHTML = '✓ At least 6 characters';
            } else {
                lengthReq.className = 'invalid';
                lengthReq.innerHTML = '✗ At least 6 characters';
                isValid = false;
            }
            
            return isValid && password.length >= 6;
        }
        
        // Password match validation
        function validatePasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (confirmPassword.length === 0) {
                passwordMatchMsg.className = 'password-match';
                passwordMatchMsg.innerHTML = '';
                return false;
            }
            
            if (password === confirmPassword) {
                passwordMatchMsg.className = 'password-match match';
                passwordMatchMsg.innerHTML = '✓ Passwords match';
                confirmPasswordInput.classList.remove('error');
                confirmPasswordInput.classList.add('success');
                return true;
            } else {
                passwordMatchMsg.className = 'password-match not-match';
                passwordMatchMsg.innerHTML = '✗ Passwords do not match';
                confirmPasswordInput.classList.remove('success');
                confirmPasswordInput.classList.add('error');
                return false;
            }
        }
        
        // Real-time validation
        passwordInput.addEventListener('input', () => {
            validatePassword();
            validatePasswordMatch();
            
            if (passwordInput.value.length >= 6) {
                passwordInput.classList.add('success');
                passwordInput.classList.remove('error');
            } else if (passwordInput.value.length > 0) {
                passwordInput.classList.add('error');
                passwordInput.classList.remove('success');
            } else {
                passwordInput.classList.remove('success', 'error');
            }
        });
        
        confirmPasswordInput.addEventListener('input', () => {
            validatePasswordMatch();
        });
        
        // Email validation
        document.getElementById('email').addEventListener('input', (e) => {
            const email = e.target.value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (emailRegex.test(email)) {
                e.target.classList.add('success');
                e.target.classList.remove('error');
            } else if (email.length > 0) {
                e.target.classList.add('error');
                e.target.classList.remove('success');
            } else {
                e.target.classList.remove('success', 'error');
            }
        });
        
        // Phone validation (Kenyan format)
        document.getElementById('phone').addEventListener('input', (e) => {
            let phone = e.target.value;
            const kenyanRegex = /^(07|01)\d{8}$/;
            if (kenyanRegex.test(phone) || phone.length === 0) {
                e.target.classList.add('success');
                e.target.classList.remove('error');
            } else if (phone.length > 0) {
                e.target.classList.add('error');
                e.target.classList.remove('success');
            }
        });
        
        // Registration handler
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Validate all fields
            if (!fullName) {
                showMessage('Please enter your full name', 'error');
                document.getElementById('fullName').focus();
                return;
            }
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                document.getElementById('email').focus();
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                document.getElementById('email').focus();
                return;
            }
            
            if (!password) {
                showMessage('Please enter a password', 'error');
                passwordInput.focus();
                return;
            }
            
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                passwordInput.focus();
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                confirmPasswordInput.focus();
                return;
            }
            
            // Disable button and show loading
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creating Account...';
            
            console.log('Attempting to register:', email);
            showMessage('Creating your account...', 'info');
            
            try {
                // Sign up with Supabase
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            phone: phone || null
                        }
                    }
                });
                
                if (error) {
                    console.error('Registration error:', error);
                    showMessage(error.message, 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                    return;
                }
                
                if (data.user) {
                    console.log('Registration successful:', data.user);
                    showMessage('Account created successfully! Please check your email for verification.', 'success');
                    
                    // Clear form
                    form.reset();
                    
                    // Remove success classes
                    document.querySelectorAll('input').forEach(input => {
                        input.classList.remove('success', 'error');
                    });
                    passwordMatchMsg.className = 'password-match';
                    passwordMatchMsg.innerHTML = '';
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    showMessage('Registration failed. Please try again.', 'error');
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Create Account';
                }
                
            } catch (err) {
                console.error('Unexpected error:', err);
                showMessage('Network error. Please check your connection.', 'error');
                registerBtn.disabled = false;
                registerBtn.textContent = 'Create Account';
            }
        });
        
        // Add some CSS for the validation classes
        const style = document.createElement('style');
        style.textContent = `
            input.success {
                border-color: #00C851 !important;
            }
            input.error {
                border-color: #ff4444 !important;
            }
            .requirements li.valid {
                color: #00C851;
                list-style: none;
            }
            .requirements li.valid:before {
                content: "✓ ";
            }
            .requirements li.invalid {
                color: #ff4444;
                list-style: none;
            }
            .requirements li.invalid:before {
                content: "✗ ";
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
