<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | MEI DRIVE AFRICA</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --primary:#041B3D;
            --secondary:#0A234F;
            --accent:#00FF88;
            --white:#ffffff;
            --gray:#B7C4D6;
            --danger:#ff4444;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            background:
                linear-gradient(rgba(4,27,61,.88), rgba(10,35,79,.92)),
                url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1600&auto=format&fit=crop')
                center/cover;
        }

        .register-box{
            width:100%;
            max-width:450px;
            background:rgba(4,27,61,.96);
            border:1px solid rgba(0,255,136,.15);
            border-radius:24px;
            padding:40px 30px;
            box-shadow:0 10px 40px rgba(0,0,0,.3);
            backdrop-filter:blur(8px);
        }

        .logo{
            text-align:center;
            font-size:52px;
            margin-bottom:10px;
        }

        h1{
            text-align:center;
            color:var(--white);
            margin-bottom:8px;
            font-size:2rem;
        }

        .subtitle{
            text-align:center;
            color:var(--gray);
            margin-bottom:30px;
            font-size:.95rem;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            color:var(--white);
            margin-bottom:8px;
            font-size:.92rem;
            font-weight:600;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border-radius:14px;
            border:2px solid transparent;
            background:rgba(255,255,255,.08);
            color:var(--white);
            font-size:15px;
            transition:.3s;
        }

        .input-group input:focus{
            outline:none;
            border-color:var(--accent);
        }

        .input-group input::placeholder{
            color:#9fb0c5;
        }

        .password-note{
            font-size:.75rem;
            color:var(--gray);
            margin-top:6px;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:14px;
            background:var(--accent);
            color:var(--primary);
            font-size:1rem;
            font-weight:700;
            cursor:pointer;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 30px rgba(0,255,136,.3);
        }

        .btn:disabled{
            opacity:.6;
            cursor:not-allowed;
        }

        .message{
            margin-bottom:20px;
            padding:12px;
            border-radius:12px;
            display:none;
            font-size:.9rem;
        }

        .error{
            background:rgba(255,68,68,.12);
            color:#ffb3b3;
            border:1px solid rgba(255,68,68,.3);
        }

        .success{
            background:rgba(0,255,136,.12);
            color:#9dffd1;
            border:1px solid rgba(0,255,136,.3);
        }

        .spinner{
            width:24px;
            height:24px;
            border:3px solid rgba(255,255,255,.2);
            border-top-color:var(--accent);
            border-radius:50%;
            animation:spin .8s linear infinite;
            margin:20px auto 0;
            display:none;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        .links{
            margin-top:25px;
            text-align:center;
            color:var(--gray);
            font-size:.92rem;
        }

        .links a{
            color:var(--accent);
            text-decoration:none;
            font-weight:600;
        }

        .back-home{
            display:block;
            margin-top:18px;
        }

        @media(max-width:480px){
            .register-box{
                padding:30px 20px;
            }
        }
    </style>
</head>

<body>

<div class="register-box">

    <div class="logo">🚗</div>

    <h1>Create Account</h1>

    <p class="subtitle">
        Join MEI DRIVE AFRICA today
    </p>

    <div id="errorBox" class="message error"></div>
    <div id="successBox" class="message success"></div>

    <form id="registerForm">

        <div class="input-group">
            <label>
                <i class="fas fa-user"></i>
                Full Name
            </label>

            <input
                type="text"
                id="fullName"
                placeholder="Enter full name"
                required
            >
        </div>

        <div class="input-group">
            <label>
                <i class="fas fa-envelope"></i>
                Email Address
            </label>

            <input
                type="email"
                id="email"
                placeholder="Enter email address"
                required
            >
        </div>

        <div class="input-group">
            <label>
                <i class="fas fa-lock"></i>
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Create password"
                required
            >

            <div class="password-note">
                Password must be at least 6 characters
            </div>
        </div>

        <div class="input-group">
            <label>
                <i class="fas fa-check-circle"></i>
                Confirm Password
            </label>

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm password"
                required
            >
        </div>

        <button type="submit" class="btn" id="registerBtn">
            Create Account
        </button>

    </form>

    <div class="spinner" id="spinner"></div>

    <div class="links">
        Already have an account?
        <a href="/login.html">Login</a>

        <a href="/" class="back-home">
            ← Back Home
        </a>
    </div>

</div>

<script>

    // SUPABASE CONFIG
    const SUPABASE_URL =
        'https://jeksrwrzzrczamxijvwl.supabase.co';

    const SUPABASE_ANON_KEY =
        'YOUR_SUPABASE_ANON_KEY';

    const { createClient } = window.supabase;

    const supabase =
        createClient(
            SUPABASE_URL,
            SUPABASE_ANON_KEY
        );

    // ELEMENTS
    const form = document.getElementById('registerForm');

    const fullName =
        document.getElementById('fullName');

    const email =
        document.getElementById('email');

    const password =
        document.getElementById('password');

    const confirmPassword =
        document.getElementById('confirmPassword');

    const registerBtn =
        document.getElementById('registerBtn');

    const spinner =
        document.getElementById('spinner');

    const errorBox =
        document.getElementById('errorBox');

    const successBox =
        document.getElementById('successBox');

    // HELPERS
    function showError(message){
        errorBox.style.display = 'block';
        successBox.style.display = 'none';
        errorBox.textContent = message;
    }

    function showSuccess(message){
        successBox.style.display = 'block';
        errorBox.style.display = 'none';
        successBox.textContent = message;
    }

    function setLoading(state){
        spinner.style.display = state ? 'block' : 'none';
        registerBtn.disabled = state;
    }

    // REGISTER
    form.addEventListener('submit', async (e) => {

        e.preventDefault();

        const fullNameValue =
            fullName.value.trim();

        const emailValue =
            email.value.trim();

        const passwordValue =
            password.value;

        const confirmPasswordValue =
            confirmPassword.value;

        errorBox.style.display = 'none';
        successBox.style.display = 'none';

        // VALIDATION
        if(
            !fullNameValue ||
            !emailValue ||
            !passwordValue ||
            !confirmPasswordValue
        ){
            return showError(
                'Please fill all fields'
            );
        }

        if(passwordValue.length < 6){
            return showError(
                'Password must be at least 6 characters'
            );
        }

        if(passwordValue !== confirmPasswordValue){
            return showError(
                'Passwords do not match'
            );
        }

        try{

            setLoading(true);

            // SIGN UP USER
            const { data, error } =
                await supabase.auth.signUp({

                    email: emailValue,

                    password: passwordValue,

                    options:{
                        data:{
                            full_name: fullNameValue,
                            role:'learner'
                        },

                        emailRedirectTo:
                            window.location.origin + '/login.html'
                    }
                });

            if(error){

                setLoading(false);

                return showError(error.message);
            }

            // INSERT PROFILE
            if(data.user){

                const { error: profileError } =
                    await supabase
                        .from('profiles')
                        .insert([{
                            id:data.user.id,
                            full_name:fullNameValue,
                            email:emailValue,
                            role:'learner'
                        }]);

                if(profileError){
                    console.error(profileError);
                }

                showSuccess(
                    'Registration successful! Please check your email.'
                );

                form.reset();

                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 3000);
            }

        }catch(err){

            console.error(err);

            showError(
                'Something went wrong. Try again.'
            );

        }finally{
            setLoading(false);
        }

    });

</script>

</body>
</html>
