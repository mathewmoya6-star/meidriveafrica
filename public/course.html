<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
            --error: #ff4444;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        
        /* Navbar */
        .navbar {
            background: var(--dark-navy);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid rgba(0,255,136,0.15);
        }
        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--neon-green);
            cursor: pointer;
        }
        .logo span { color: white; }
        
        /* Main Content */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 20px 40px;
        }
        
        /* Course Header */
        .course-header {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .course-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .course-badge {
            display: inline-block;
            background: var(--neon-green);
            color: var(--dark-navy);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-bottom: 1rem;
        }
        .course-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            margin: 1rem 0;
        }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .btn-primary, .btn-secondary {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        .btn-primary {
            background: var(--neon-green);
            color: var(--dark-navy);
            border: none;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,255,136,0.3);
        }
        .btn-secondary:hover {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        
        /* Course Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .info-card {
            background: var(--secondary-dark);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        .info-card i {
            font-size: 1.5rem;
            color: var(--neon-green);
            margin-bottom: 0.5rem;
        }
        .info-card h4 {
            font-size: 0.85rem;
            color: var(--soft-gray);
            margin-bottom: 0.25rem;
        }
        .info-card p {
            font-weight: bold;
        }
        
        /* What You'll Learn */
        .learn-section {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .learn-section h3 {
            color: var(--neon-green);
            margin-bottom: 1rem;
        }
        .learn-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 0.8rem;
            list-style: none;
        }
        .learn-list li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .learn-list li i {
            color: var(--neon-green);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Back Button */
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }
        .btn-back:hover {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container { padding: 80px 15px 30px; }
            .course-header { padding: 1.5rem; }
            .course-price { font-size: 1.2rem; }
            .action-buttons { flex-direction: column; }
            .btn-primary, .btn-secondary { text-align: center; }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
    </div>
</nav>

<div class="container" id="container">
    <div class="loading">
        <div class="spinner"></div>
        <p>Loading course details...</p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // Get course ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');
    
    // Course icons
    const courseIcons = {
        1: '🚗', 2: '🚌', 3: '🚸', 4: '⚡', 5: '🛵', 6: '🚛', 7: '📚', 8: '📝'
    };
    
    // What you'll learn items per course
    const whatYouLearn = {
        1: [
            'Kenyan traffic laws and Highway Code',
            'Model town navigation (one-way, two-way, roundabouts)',
            'Vehicle controls and self-inspection',
            'MSM communication technique',
            'Speed and space management',
            'Emergency manoeuvres and skid recovery',
            'NTSA examination preparation'
        ],
        2: [
            'PSV licensing requirements (NTSA)',
            'Passenger safety and rights',
            'Route planning and time management',
            'Defensive driving for commercial vehicles',
            'Customer service excellence',
            'Fare management and ticketing'
        ],
        3: [
            'Child passenger safety protocols',
            'Loading and unloading procedures',
            'Student behaviour management',
            'Emergency evacuation drills',
            'First aid for children',
            'Route risk assessment'
        ],
        4: [
            'EV vehicle controls and dashboard',
            'Regenerative braking systems',
            'Battery management and range optimization',
            'Charging station types',
            'EV maintenance and safety',
            'Eco-driving techniques'
        ],
        5: [
            'Motorcycle controls and balance',
            'Protective gear (helmet, jacket, gloves)',
            'Passenger safety protocols',
            'Defensive riding techniques',
            'Night and wet weather riding',
            'Emergency braking and swerving'
        ],
        6: [
            'Advanced defensive driving',
            'Skid control and recovery',
            'Adverse driving conditions',
            'Emergency manoeuvres',
            'Professional conduct',
            'Fleet management basics'
        ],
        7: [
            'Road safety guides for pedestrians',
            'Cyclist safety handbook',
            'Child road safety education',
            'Elderly road user guidelines',
            'Defensive driving articles',
            'Emergency response guides'
        ],
        8: [
            'Road signs (200+ questions)',
            'Traffic Act regulations (150+)',
            'Vehicle controls and maintenance',
            'Defensive driving scenarios',
            'Emergency procedures',
            'Mock NTSA examinations'
        ]
    };
    
    async function loadCourse() {
        const container = document.getElementById('container');
        
        if (!courseId) {
            container.innerHTML = `
                <button class="btn-back" onclick="location.href='/'">
                    <i class="fas fa-arrow-left"></i> Back to Courses
                </button>
                <div class="course-header">
                    <h1>Course Not Found</h1>
                    <p>Please select a valid course.</p>
                </div>
            `;
            return;
        }
        
        try {
            // Load course from Supabase
            const { data: course, error } = await supabase
                .from('courses')
                .select('*')
                .eq('id', courseId)
                .single();
            
            if (error) throw error;
            
            const isFree = course.type === 'free';
            const icon = courseIcons[course.id] || '📚';
            const courseName = course.name || course.title;
            const courseDesc = course.description || '';
            const learnItems = whatYouLearn[course.id] || whatYouLearn[1];
            
            container.innerHTML = `
                <button class="btn-back" onclick="location.href='/'">
                    <i class="fas fa-arrow-left"></i> Back to Courses
                </button>
                
                <div class="course-header">
                    <div class="course-icon">${icon}</div>
                    <div class="course-badge">${isFree ? 'FREE COURSE' : 'PREMIUM COURSE'}</div>
                    <h1>${escapeHtml(courseName)}</h1>
                    <p>${escapeHtml(courseDesc)}</p>
                    <div class="course-price">${isFree ? 'FREE' : `KES ${(course.price || 0).toLocaleString()}`}</div>
                    
                    <div class="info-grid">
                        <div class="info-card">
                            <i class="fas fa-clock"></i>
                            <h4>Duration</h4>
                            <p>${course.duration || 'Self-paced'}</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-signal"></i>
                            <h4>Level</h4>
                            <p>${course.level || 'All levels'}</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-certificate"></i>
                            <h4>Certificate</h4>
                            <p>Upon completion</p>
                        </div>
                        <div class="info-card">
                            <i class="fas fa-users"></i>
                            <h4>Students</h4>
                            <p>10,000+ enrolled</p>
                        </div>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn-primary" onclick="viewMaterials(${course.id})">
                            <i class="fas fa-book-open"></i> View Course Materials
                        </button>
                        <button class="btn-secondary" onclick="enrollCourse(${course.id}, '${course.type}')">
                            ${isFree ? '<i class="fas fa-graduation-cap"></i> Enroll Now' : '<i class="fas fa-credit-card"></i> Purchase Course'}
                        </button>
                    </div>
                </div>
                
                <div class="learn-section">
                    <h3><i class="fas fa-graduation-cap"></i> What You'll Learn</h3>
                    <ul class="learn-list">
                        ${learnItems.map(item => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(item)}</li>`).join('')}
                    </ul>
                </div>
            `;
            
        } catch (error) {
            console.error('Error:', error);
            container.innerHTML = `
                <button class="btn-back" onclick="location.href='/'">
                    <i class="fas fa-arrow-left"></i> Back to Courses
                </button>
                <div class="course-header">
                    <h1>Error Loading Course</h1>
                    <p>${error.message}</p>
                </div>
            `;
        }
    }
    
    function viewMaterials(courseId) {
        window.location.href = `/materials-display.html?id=${courseId}`;
    }
    
    async function enrollCourse(courseId, courseType) {
        // Check if user is logged in
        const { data: { session } } = await supabase.auth.getSession();
        
        if (!session) {
            alert('Please login to enroll in this course');
            window.location.href = '/login.html';
            return;
        }
        
        if (courseType === 'free') {
            // Free enrollment
            const { error } = await supabase
                .from('enrollments')
                .insert({
                    user_id: session.user.id,
                    course_id: courseId,
                    progress: 0,
                    status: 'active'
                });
            
            if (error) {
                if (error.code === '23505') {
                    alert('You are already enrolled in this course!');
                } else {
                    alert('Enrollment failed. Please try again.');
                }
            } else {
                alert('Successfully enrolled! Redirecting to course materials...');
                window.location.href = `/materials-display.html?id=${courseId}`;
            }
        } else {
            // Premium course - redirect to payment
            alert('Payment gateway coming soon. This is a premium course.');
            // window.location.href = `/payment.html?course_id=${courseId}`;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadCourse();
</script>
</body>
</html>
