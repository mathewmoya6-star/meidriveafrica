<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 20px 40px;
        }
        .course-header {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .btn-primary, .btn-secondary {
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            display: inline-block;
        }
        .btn-primary {
            background: var(--neon-green);
            color: var(--dark-navy);
            border: none;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            margin-left: 1rem;
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="navbar"><div style="max-width:1200px;margin:auto;"><div style="font-size:1.5rem;color:var(--neon-green);">MEI DRIVE AFRICA</div></div></nav>
    <div class="container" id="container"><div class="loading"><div class="spinner"></div><p>Loading course details...</p></div></div>
    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        
        const courseIcons = { 1: '🚗', 2: '🚌', 3: '🚸', 4: '⚡', 5: '🛵', 6: '🚛', 7: '📚', 8: '📝' };
        
        async function loadCourse() {
            const container = document.getElementById('container');
            if (!courseId) {
                container.innerHTML = '<div class="loading">No course selected</div>';
                return;
            }
            
            const { data: course, error } = await supabase
                .from('courses')
                .select('*')
                .eq('id', courseId)
                .single();
            
            if (error || !course) {
                container.innerHTML = '<div class="loading">Course not found</div>';
                return;
            }
            
            const isFree = course.type === 'free';
            const icon = courseIcons[course.id] || '📘';
            const courseName = course.name || course.title;
            
            container.innerHTML = `
                <button class="btn-back" onclick="location.href='/'"><i class="fas fa-arrow-left"></i> Back to Courses</button>
                <div class="course-header">
                    <div style="font-size:3rem;">${icon}</div>
                    <div class="course-badge" style="display:inline-block;background:#00FF88;color:#041B3D;padding:4px 12px;border-radius:20px;margin:1rem 0;">${isFree ? 'FREE COURSE' : 'PREMIUM COURSE'}</div>
                    <h1>${escapeHtml(courseName)}</h1>
                    <p>${escapeHtml(course.description)}</p>
                    <div class="course-price" style="font-size:1.5rem;font-weight:bold;color:var(--neon-green);margin:1rem 0;">${isFree ? 'FREE' : `KES ${(course.price || 0).toLocaleString()}`}</div>
                    <div>
                        <button class="btn-primary" onclick="viewMaterials(${course.id})">📖 View Course Materials</button>
                        <button class="btn-secondary" onclick="enrollCourse(${course.id})">${isFree ? 'Enroll Now' : 'Purchase Course'}</button>
                    </div>
                </div>
            `;
        }
        
        function viewMaterials(courseId) {
            window.location.href = `/materials-display.html?id=${courseId}`;
        }
        
        function enrollCourse(courseId) {
            window.location.href = `/login.html`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        loadCourse();
    </script>
</body>
</html>
