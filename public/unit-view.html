<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Content - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #fff;
            --soft-gray: #B7C4D6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
            line-height: 1.6;
        }
        .navbar {
            background: var(--dark-navy);
            padding: 0.8rem 1.5rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .container {
            max-width: 900px;
            margin: auto;
            padding: 100px 20px 40px;
        }
        .unit-content {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .unit-content h1, .unit-content h2, .unit-content h3 {
            color: var(--neon-green);
            margin: 1rem 0;
        }
        .unit-content p {
            margin: 0.5rem 0;
        }
        .unit-content ul, .unit-content ol {
            padding-left: 2rem;
            margin: 0.5rem 0;
        }
        .unit-content li {
            margin: 0.25rem 0;
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .unit-content { padding: 1.2rem; }
            .container { padding: 80px 15px 30px; }
        }
    </style>
</head>
<body>
    <nav class="navbar"><div style="max-width:1200px;margin:auto;"><div style="font-size:1.3rem;color:var(--neon-green);">MEI DRIVE AFRICA</div></div></nav>
    <div class="container" id="container"><div class="loading"><div class="spinner"></div><p>Loading unit content...</p></div></div>
    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('course_id');
        const unitNumber = urlParams.get('unit');
        
        async function loadUnit() {
            const container = document.getElementById('container');
            
            if (!courseId || !unitNumber) {
                container.innerHTML = '<div class="loading">Invalid unit. <button class="btn-back" onclick="history.back()">Go Back</button></div>';
                return;
            }
            
            try {
                const { data: unit, error } = await supabase
                    .from('course_units')
                    .select('*')
                    .eq('course_id', courseId)
                    .eq('unit_number', unitNumber)
                    .single();
                
                if (error) throw error;
                
                if (!unit) {
                    container.innerHTML = '<div class="loading">Unit not found.<button class="btn-back" onclick="history.back()">Go Back</button></div>';
                    return;
                }
                
                let content = unit.content || 'Content coming soon...';
                
                container.innerHTML = `
                    <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back to Materials</button>
                    <div class="unit-content">
                        <div style="color:var(--neon-green); margin-bottom:1rem;">Unit ${unit.unit_number}</div>
                        <h1>${escapeHtml(unit.title)}</h1>
                        <div>${formatContent(content)}</div>
                        ${unit.key_points ? `
                            <div style="background:var(--secondary-dark); padding:1rem; border-radius:12px; margin-top:2rem;">
                                <h3>📌 Key Takeaways</h3>
                                <ul>${unit.key_points.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
                            </div>
                        ` : ''}
                    </div>
                `;
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="loading">Error loading unit: ${error.message}<button class="btn-back" onclick="history.back()">Go Back</button></div>`;
            }
        }
        
        function formatContent(content) {
            let html = content;
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n- (.*$)/gm, '<li>$1</li>');
            html = html.replace(/<li>(.*?)<\/li>/gs, '<ul>$&</ul>');
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';
            return html;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        loadUnit();
    </script>
</body>
</html>
