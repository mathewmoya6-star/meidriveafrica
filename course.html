<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Details - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        import { auth } from './src/auth.js';
        import { requireAuth } from './src/routeGuard.js';
        
        // Get course ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id');
        
        let courseData = null;
        
        async function loadCourse() {
            const loadingDiv = document.getElementById('loading');
            const contentDiv = document.getElementById('courseContent');
            
            try {
                // First check if user has access
                const hasAccess = await auth.checkCourseAccess(courseId);
                
                const response = await fetch(`/api/courses/${courseId}`);
                const data = await response.json();
                
                if (data.success) {
                    courseData = data.course;
                    
                    // Check if course requires premium and user has access
                    if (courseData.type === 'premium' && !hasAccess && !auth.isAuthenticated()) {
                        requireAuth();
                        return;
                    }
                    
                    if (courseData.type === 'premium' && !hasAccess && auth.isAuthenticated()) {
                        contentDiv.innerHTML = `
                            <div class="premium-locked">
                                <h2>Premium Course</h2>
                                <p>This course requires payment to access.</p>
                                <button onclick="window.location.href='/payment.html?course_id=${courseId}'">
                                    Pay KES ${courseData.price}
                                </button>
                            </div>
                        `;
                        loadingDiv.style.display = 'none';
                        return;
                    }
                    
                    // Display course content
                    displayCourse(courseData);
                }
                
                loadingDiv.style.display = 'none';
                
            } catch (error) {
                console.error('Error:', error);
                loadingDiv.innerHTML = '<p>Error loading course. Please try again.</p>';
            }
        }
        
        function displayCourse(course) {
            const contentDiv = document.getElementById('courseContent');
            contentDiv.innerHTML = `
                <h1>${escapeHtml(course.title)}</h1>
                <p>${escapeHtml(course.description)}</p>
                <div class="course-content">
                    ${escapeHtml(course.content || 'Course content coming soon...')}
                </div>
                <button onclick="markComplete()" class="complete-btn">Mark as Complete</button>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        async function markComplete() {
            // Update progress in database
            alert('Course progress saved!');
        }
        
        // Initialize
        loadCourse();
    </script>
    <style>
        .premium-locked {
            text-align: center;
            padding: 50px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        .premium-locked button {
            background: #00FF88;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="loading">Loading course...</div>
    <div id="courseContent"></div>
</body>
</html>
