<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
            --error: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--dark-navy), var(--secondary-dark));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-container {
            background: var(--dark-navy);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .logo { text-align: center; font-size: 3rem; margin-bottom: 20px; }
        h2 { text-align: center; color: var(--white); margin-bottom: 10px; }
        .subtitle { text-align: center; color: var(--soft-gray); margin-bottom: 30px; font-size: 0.9rem; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: var(--soft-gray); margin-bottom: 8px; font-size: 0.9rem; }
        .input-group input {
            width: 100%;
            padding: 14px;
            background: var(--secondary-dark);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 12px;
            color: var(--white);
            font-size: 1rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--neon-green);
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--neon-green);
            color: var(--dark-navy);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3); }
        .auth-switch { text-align: center; margin-top: 20px; color: var(--soft-gray); }
        .auth-switch a { color: var(--neon-green); cursor: pointer; text-decoration: none; }
        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        .loading-spinner { display: none; text-align: center; margin-top: 15px; }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--neon-green);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-home { text-align: center; margin-top: 20px; }
        .back-home a { color: var(--soft-gray); text-decoration: none; font-size: 0.9rem; }
        .back-home a:hover { color: var(--neon-green); }
        .password-requirements {
            font-size: 0.75rem;
            color: var(--soft-gray);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">🚗</div>
        <h2>Create Account</h2>
        <p class="subtitle">Join MEI Drive Africa today</p>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="registerForm">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
                <div class="password-requirements">Password must be at least 6 characters</div>
            </div>
            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>
            <button type="submit" id="registerBtn">Create Account</button>
        </form>
        
        <div id="loadingSpinner" class="loading-spinner">
            <div class="spinner"></div>
        </div>
        
        <div class="auth-switch">
            Already have an account? <a id="loginLink">Login</a>
        </div>
        
        <div class="back-home">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const form = document.getElementById('registerForm');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const registerBtn = document.getElementById('registerBtn');
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }
        
        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
        }
        
        function setLoading(loading) {
            if (loading) {
                loadingSpinner.style.display = 'block';
                registerBtn.disabled = true;
            } else {
                loadingSpinner.style.display = 'none';
                registerBtn.disabled = false;
            }
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (!fullName || !email || !password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            setLoading(true);
            
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullName
                    }
                }
            });
            
            setLoading(false);
            
            if (error) {
                showError(error.message);
                return;
            }
            
            if (data.user) {
                showSuccess('Registration successful! Please check your email to confirm your account.');
                form.reset();
                
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 3000);
            }
        });
        
        document.getElementById('loginLink').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = '/login.html';
        });
        
        // Redirect if already logged in
        const token = localStorage.getItem('access_token');
        if (token) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
